<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#0a0e0a"/>
  <rect x="2" y="2" width="60" height="60" fill="#1a1a0f" rx="2" stroke="#3f3a2a" stroke-width="1"/>
  <!-- Pip-Boy frame -->
  <rect x="4" y="4" width="56" height="56" fill="none" stroke="#5a5a3a" stroke-width="0.5" rx="1"/>
  <!-- Head - hooded figure -->
  <circle cx="32" cy="24" r="11" fill="#c9a84c" opacity="0.85"/>
  <!-- Hood -->
  <path d="M19 26 Q20 10 32 8 Q44 10 45 26 Q44 28 42 26 Q40 14 32 12 Q24 14 22 26 Q20 28 19 26 Z" fill="#8a7535"/>
  <!-- Eyes - focused, observant -->
  <circle cx="28" cy="24" r="1.5" fill="#0a0e0a"/>
  <circle cx="36" cy="24" r="1.5" fill="#0a0e0a"/>
  <!-- Small glasses/spectacles -->
  <circle cx="28" cy="24" r="3" fill="none" stroke="#5a5a3a" stroke-width="0.8"/>
  <circle cx="36" cy="24" r="3" fill="none" stroke="#5a5a3a" stroke-width="0.8"/>
  <line x1="31" y1="24" x2="33" y2="24" stroke="#5a5a3a" stroke-width="0.8"/>
  <!-- Neutral expression -->
  <line x1="29" y1="29" x2="35" y2="29" stroke="#0a0e0a" stroke-width="1" stroke-linecap="round"/>
  <!-- Body - robed -->
  <path d="M20 36 L22 36 Q32 34 42 36 L44 36 L44 56 L20 56 Z" fill="#c9a84c" opacity="0.85"/>
  <!-- Book/notebook detail -->
  <rect x="27" y="42" width="10" height="12" rx="1" fill="#0a0e0a" opacity="0.4"/>
  <line x1="29" y1="45" x2="35" y2="45" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
  <line x1="29" y1="47" x2="35" y2="47" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
  <line x1="29" y1="49" x2="33" y2="49" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
  <!-- Scanlines -->
  <line x1="4" y1="15" x2="60" y2="15" stroke="#0a0e0a" stroke-width="0.3" opacity="0.3"/>
  <line x1="4" y1="30" x2="60" y2="30" stroke="#0a0e0a" stroke-width="0.3" opacity="0.3"/>
  <line x1="4" y1="45" x2="60" y2="45" stroke="#0a0e0a" stroke-width="0.3" opacity="0.3"/>
</svg>
